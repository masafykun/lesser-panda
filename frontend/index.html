<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>レッサーパンダ.jp — AIがつくりだすレッサーパンダ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="orbs" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <canvas id="particleCanvas" aria-hidden="true"></canvas>

    <div class="container">
        <header class="header">
            <div class="logo">
                <div class="logo-icon">🦝</div>
                <div class="logo-text">
                    <h1>レッサーパンダ<span class="logo-jp">.jp</span></h1>
                    <p class="logo-tagline">AIがつくりだすたったひとつだけのレッサーパンダ</p>
                </div>
            </div>
            <div class="header-badge">
                <span class="badge-dot"></span>
                <span id="totalCount">0</span>&thinsp;匹のパンダが誕生
            </div>
        </header>

        <main>
            <section class="generator">
                <div class="glass-card generator-card">
                    <div class="card-label">✦ GENERATE</div>
                    <h2 class="card-title">あなただけのレッサーパンダをつくろう</h2>

                    <div class="image-frame" id="imageDisplay">
                        <div class="placeholder">
                            <div class="placeholder-panda">🦝</div>
                            <p>ボタンをおしてレッサーパンダをつくってね</p>
                        </div>
                    </div>

                    <div class="controls">
                        <button id="generateBtn" class="generate-btn">
                            <span class="btn-shimmer"></span>
                            <span class="btn-content">
                                <span class="btn-icon">✨</span>
                                <span>つくろう！</span>
                            </span>
                        </button>
                        <div class="status-area">
                            <div id="message" class="message msg-hidden"></div>
                            <div id="timer" class="timer timer-hidden"></div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="gallery-section">
                <div class="section-header">
                    <div class="section-label">✦ GALLERY</div>
                    <h2 class="section-title">いままでつくったレッサーパンダ</h2>
                </div>
                <div id="gallery" class="gallery-grid"></div>
            </section>
        </main>

        <footer class="footer">
            <p>🦝 レッサーパンダ.jp — Powered by AI &amp; OpenAI DALL·E 3</p>
            <p class="footer-small">© 2026</p>
        </footer>
    </div>

    <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-hidden="true">
        <div class="lightbox-backdrop"></div>
        <div class="lightbox-content">
            <button class="lightbox-close" aria-label="閉じる">×</button>
            <img id="lightboxImg" src="" alt="レッサーパンダ">
            <div id="lightboxDate" class="lightbox-date"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
